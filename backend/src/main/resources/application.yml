# ============================================
# Member 1: Application configuration
# ============================================
spring:
  application:
    name: event-management-api

  datasource:
    url: jdbc:mysql://localhost:3306/event_management_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: gabber1234@
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080
  servlet:
    context-path: /api

# JWT (auth)
app:
  jwt:
    secret: event-management-secret-key-min-256-bits-required-for-hs256-algorithm
    expiration-ms: 86400000  # 24 hours

# Logging
logging:
  level:
    com.eventmanagement: DEBUG
    org.hibernate.SQL: DEBUG
